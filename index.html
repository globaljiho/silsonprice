<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세대별 정밀 실손의료보험 계산기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
            background-color: #f2f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .calculator-container {
            background-color: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #191f28;
            font-size: 22px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        /* 입원/통원 토글 스위치 스타일 */
        .toggle-wrapper {
            display: flex;
            background-color: #f2f4f6;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 25px;
        }
        .toggle-wrapper input[type="radio"] {
            display: none;
        }
        .toggle-wrapper label {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            color: #8b95a1;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            margin-bottom: 0;
        }
        .toggle-wrapper input[type="radio"]:checked + label {
            background-color: #ffffff;
            color: #3182f6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #4e5968;
        }
        select, input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d6db;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            color: #333d4b;
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select {
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b95a1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 12px auto;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3182f6;
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.1);
            background-color: #ffffff;
        }
        
        /* 버튼 그룹 (보장내용 / 면책사항) */
        .btn-group-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .info-btn {
            flex: 1;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
        }
        .coverage-btn {
            color: #3182f6;
            background-color: rgba(49, 130, 246, 0.1);
        }
        .coverage-btn:active {
            background-color: rgba(49, 130, 246, 0.2);
        }
        .exclusion-btn {
            color: #e53e3e;
            background-color: rgba(229, 62, 62, 0.1);
        }
        .exclusion-btn:active {
            background-color: rgba(229, 62, 62, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #3182f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:active {
            background-color: #1b64da;
        }
        
        /* 결과창 스타일 */
        .result-box {
            margin-top: 25px;
            padding: 25px 20px;
            background-color: #f2f8ff;
            border-radius: 12px;
            text-align: center;
        }
        .result-box > span {
            display: block;
            font-size: 15px;
            color: #4e5968;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .breakdown-container {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .breakdown-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #4e5968;
        }
        .breakdown-item:last-child {
            margin-bottom: 0;
        }
        .breakdown-item .label {
            font-weight: 600;
        }
        .breakdown-item .value {
            font-weight: 700;
            color: #333d4b;
        }
        .result-amount {
            font-size: 32px;
            font-weight: 800;
            color: #3182f6;
            margin-bottom: 15px;
        }
        /* 경고 문구 빨간색 강조 */
        .disclaimer {
            font-size: 12px;
            color: #e53e3e; 
            font-weight: 600;
            margin-top: 15px;
            line-height: 1.5;
            word-break: keep-all;
            background-color: rgba(229, 62, 62, 0.05);
            padding: 10px;
            border-radius: 8px;
        }
        
        /* 모달창 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: #191f28;
            margin-bottom: 12px;
        }
        .modal-body {
            font-size: 13px;
            color: #4e5968;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-body ul {
            padding-left: 18px;
            margin: 0;
        }
        .modal-body li {
            margin-bottom: 8px;
        }
        .modal-close-btn {
            width: 100%;
            padding: 12px;
            background-color: #f2f4f6;
            color: #4e5968;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>실손보험 예상 수령액 계산기</h2>

    <!-- 입원/통원 선택 토글 -->
    <div class="toggle-wrapper">
        <input type="radio" id="care_in" name="care_type" value="inpatient" checked onchange="updateFields()">
        <label for="care_in">입원</label>
        <input type="radio" id="care_out" name="care_type" value="outpatient" onchange="updateFields()">
        <label for="care_out">통원 (외래)</label>
    </div>
    
    <div class="form-group">
        <label for="generation">실손보험 세대 선택</label>
        <select id="generation" onchange="updateFields()">
            <option value="1">1세대 (2009년 7월 이전)</option>
            <option value="2-1">2세대 1차 (2009년 8월 ~ 2013년 3월)</option>
            <option value="2-2">2세대 2차 (2013년 4월 ~ 2015년 8월) (선택형 기준)</option>
            <option value="2-3">2세대 3차 (2015년 9월 ~ 2017년 3월) (선택형 기준)</option>
            <option value="3">3세대 (2017년 4월 ~ 2021년 6월) (선택형 기준)</option>
            <option value="4">4세대 (2021년 7월 ~ 2026년 5월 5일)</option>
            <option value="5">5세대 (2026년 5월 6일 이후)</option>
        </select>
        
        <!-- 보장내용 / 면책사항 버튼 그룹 -->
        <div class="btn-group-row">
            <button type="button" class="info-btn coverage-btn" onclick="openModal('coverage')">💡 핵심 보장내용</button>
            <button type="button" class="info-btn exclusion-btn" onclick="openModal('exclusion')">🚫 면책사항 보기</button>
        </div>
    </div>

    <div class="form-group" id="group_hospital_tier" style="display: none;">
        <label id="tier_label" for="hospital_tier">병원 규모</label>
        <select id="hospital_tier">
            <option value="clinic">의원</option>
            <option value="hospital">병원</option>
            <option value="general">종합병원</option>
            <option value="tertiary">상급종합병원</option>
        </select>
    </div>

    <div class="form-group">
        <label for="covered">급여 의료비 (원)</label>
        <input type="number" id="covered" placeholder="예: 100000" min="0" inputmode="numeric">
    </div>

    <div class="form-group" id="group_general_non_covered">
        <label for="general_non_covered">일반 비급여 의료비 (원)</label>
        <input type="number" id="general_non_covered" placeholder="예: 100000" min="0" inputmode="numeric">
    </div>

    <div class="form-group" id="group_3_major" style="display: none;">
        <label for="major_3_non_covered">3대 비급여 (도수/체외충격파/주사/MRI) (원)</label>
        <input type="number" id="major_3_non_covered" placeholder="예: 300000" min="0" inputmode="numeric">
    </div>

    <div class="form-group" id="group_severe_5g" style="display: none;">
        <label for="severe_5g">중증 비급여 (특약1) (원)</label>
        <input type="number" id="severe_5g" placeholder="예: 100000" min="0" inputmode="numeric">
    </div>

    <div class="form-group" id="group_non_severe_5g" style="display: none;">
        <label for="non_severe_5g">비중증 비급여 (특약2) (원)</label>
        <input type="number" id="non_severe_5g" placeholder="예: 100000" min="0" inputmode="numeric">
    </div>

    <button type="button" class="submit-btn" onclick="calculateInsurance()">보험금 산출하기</button>

    <div class="result-box" id="resultBox" style="display: none;">
        <span>항목별 예상 수령액 상세</span>
        
        <div id="breakdownContainer" class="breakdown-container">
            <div class="breakdown-item" id="itemCovered">
                <span class="label">급여:</span>
                <span class="value" id="valCovered">0 원</span>
            </div>
            <div class="breakdown-item" id="itemGeneralNC">
                <span class="label">일반 비급여:</span>
                <span class="value" id="valGeneralNC">0 원</span>
            </div>
            <div class="breakdown-item" id="itemMajor3" style="display: none;">
                <span class="label">3대 비급여:</span>
                <span class="value" id="valMajor3">0 원</span>
            </div>
            <div class="breakdown-item" id="itemSevere" style="display: none;">
                <span class="label">중증 비급여:</span>
                <span class="value" id="valSevere">0 원</span>
            </div>
            <div class="breakdown-item" id="itemNonSevere" style="display: none;">
                <span class="label">비중증 비급여:</span>
                <span class="value" id="valNonSevere">0 원</span>
            </div>
        </div>

        <span>총 예상 수령액</span>
        <div class="result-amount" id="resultAmount">0 원</div>
        <div class="disclaimer" id="disclaimerText">
            <!-- 자바스크립트에서 상황에 맞게 텍스트 주입 -->
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="modal-close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    // 보장내용 데이터
    const coverageInfo = {
        "1": {
            title: "💡 1세대 실손 보장내용 (~2009.7)",
            content: `<ul>
                <li><b>자기부담금:</b> 입원 100% 보상 / 통원 5,000원 정액 공제</li>
                <li><b>면책사항:</b> 치매, 디스크, 직장/항문질환 등 기본 보상 제외 (가입시기별 상이)</li>
            </ul>`
        },
        "2-1": {
            title: "💡 2세대 1차 보장내용 (2009.8~2013.3)",
            content: `<ul>
                <li><b>표준화 도입:</b> 입원 10% 본인부담금 신설</li>
                <li><b>통원공제:</b> 의원 1만/병원 1.5만/종합 2만원 정액 공제</li>
            </ul>`
        },
        "2-2": {
            title: "💡 2세대 2차 보장내용 (2013.4~2015.8)",
            content: `<ul>
                <li><b>재가입주기:</b> 1년 갱신 / 15년 만기(재가입)</li>
                <li><b>선택형 기준:</b> 입원 10% 공제 / 통원은 병원급 정액 공제 유지</li>
            </ul>`
        },
        "2-3": {
            title: "💡 2세대 3차 보장내용 (2015.9~2017.3)",
            content: `<ul>
                <li><b>선택형 기준 인상:</b> 입원 급여 10%·비급여 20% 공제로 세분화</li>
                <li><b>통원공제:</b> 정액공제와 (급여10%+비급여20%) 중 큰 금액 차감</li>
            </ul>`
        },
        "3": {
            title: "💡 3세대 실손 보장내용 (2017.4~2021.6)",
            content: `<ul>
                <li><b>3대 비급여 분리:</b> 도수, 비급여 주사, MRI 특약 분리 (30% 공제)</li>
                <li><b>선택형 기준:</b> 기본 급여 10% / 기본 비급여 20% 공제</li>
            </ul>`
        },
        "4": {
            title: "💡 4세대 실손 보장내용 (2021.7~2026.5)",
            content: `<ul>
                <li><b>보험료 차등제:</b> 비급여 청구량에 따라 할증/할인</li>
                <li><b>자기부담금:</b> 급여 20% / 비급여 30% 기본 공제</li>
            </ul>`
        },
        "5": {
            title: "💡 5세대 실손 보장내용 (2026.5.6~)",
            content: `<ul>
                <li><b>비급여 세분화:</b> 중증 50% 공제 / 비중증은 병원 규모별 30~60% 차등 공제 (입/통원 공통)</li>
                <li><b>3대 비급여:</b> 30% 공제 유지</li>
            </ul>`
        }
    };

    // 세대별 면책사항 데이터 (제공된 PDF 자료 기반)
    const exclusionInfo = {
        "1": {
            title: "🚫 1세대 실손 면책사항 (~2009.7)",
            content: `<ul>
                <li>정신질환 및 행동장애(F04-F99)는 보상하지 않습니다 (단, 치매 F00-F03은 보험사별 상이하게 보상).[cite: 3]</li>
                <li>치과질환, 한방치료, 임신 및 출산(O00-O99), 성병(A50-A64)은 보상에서 제외됩니다.[cite: 3]</li>
                <li>치핵, 요실금 등 비뇨기계 장애 및 직장/항문 질환(I84, K60-K62, N39)은 보상하지 않습니다.[cite: 3]</li>
            </ul>`
        },
        "2-1": {
            title: "🚫 2세대 1차 면책사항 (2009.8~2013.3)",
            content: `<ul>
                <li>정신과질환 및 행동장애(F04-F99)는 보상하지 않습니다 (치매 F00-F03은 보상).[cite: 1]</li>
                <li>치과치료, 한방치료의 비급여 부분은 보상에서 제외됩니다.[cite: 1]</li>
                <li>여성생식기 비염증성 장애(N96-N98), 임신, 출산 및 산후기(O00-O99), 선천성 뇌질환(Q00-Q04) 보상 제외.[cite: 1]</li>
                <li>비뇨기계 장애(N39, R32) 및 직장/항문질환(I84, K60-K62)의 비급여 부분 보상 제외.[cite: 1]</li>
            </ul>`
        },
        "2-2": {
            title: "🚫 2세대 2차 면책사항 (2013.4~2015.8)",
            content: `<ul>
                <li>2세대 1차와 동일하게 정신과질환(F04-F99), 치과/한방치료 비급여는 보상하지 않습니다.[cite: 1]</li>
                <li>임신, 출산 및 산후기(O00-O99), 비뇨기계 장애 비급여(N39, R32) 등 면책 유지.[cite: 1]</li>
            </ul>`
        },
        "2-3": {
            title: "🚫 2세대 3차 면책사항 (2015.9~2017.3)",
            content: `<ul>
                <li>치과치료, 한방치료 비급여 부분은 보상에서 계속 제외됩니다.[cite: 1]</li>
                <li><b>보장 확대:</b> 기존에 면책이던 일부 정신과 질환(우울증, 조현병 등 F04-F09, F20-F29 등)의 '급여' 부분은 면책에서 제외되어 보상 개시되었습니다.[cite: 1]</li>
            </ul>`
        },
        "3": {
            title: "🚫 3세대 실손 면책사항 (2017.4~2021.6)",
            content: `<ul>
                <li>외모개선 목적의 치료(지방흡입 등)는 명확히 보상에서 제외됩니다.[cite: 2]</li>
                <li>분리된 3대 비급여(도수, 주사, MRI)는 횟수 제한(예: 도수치료 연 50회) 초과 시 면책됩니다.[cite: 2]</li>
                <li>치과/한방 비급여 및 임신/출산 관련(O00-O99) 면책은 기존 세대와 동일하게 유지됩니다.[cite: 2]</li>
            </ul>`
        },
        "4": {
            title: "🚫 4세대 실손 면책사항 (2021.7~2026.5)",
            content: `<ul>
                <li>비급여 도수치료는 10회 치료받을 때마다 객관적 검사 결과 제출 시에만(최대 50회) 보장되며, 미제출 시 면책됩니다.[cite: 2]</li>
                <li>비급여 주사치료는 약사법령에 의한 허가사항/신고된 사항에 따라 투여된 경우에만 보장됩니다(단순 영양제 등 면책).[cite: 2]</li>
                <li><b>보장 확대:</b> 피부질환(여드름 등) 치료 목적 시 급여 보장, 태아 가입 시 선천성 뇌질환(Q00-Q04) 면책 해제.[cite: 2]</li>
            </ul>`
        },
        "5": {
            title: "🚫 5세대 실손 면책사항 (2026.5.6 이후)",
            content: `<ul>
                <li>특약1(중증 비급여) 의료과잉 방지: 3대 비급여 도수/체외충격파 연간 100회 한도 등 초과 시 면책 적용.[cite: 4]</li>
                <li><b>면책 대폭 해제:</b> 임신, 출산, 산후기(O00~O99)는 분만예정일 280일 이전 가입 시 면책 해제(보장됨).[cite: 4]</li>
                <li>습관성 유산 등(N96~N98) 가입 2년 후 급여 보장, 정신발달장애(F80-F89) 태아 가입 시 18세까지 보장.[cite: 4]</li>
            </ul>`
        }
    };

    function updateFields() {
        const gen = document.getElementById('generation').value;
        const careType = document.querySelector('input[name="care_type"]:checked').value;
        
        // 입력 필드 초기화
        document.getElementById('group_general_non_covered').style.display = 'none';
        document.getElementById('group_3_major').style.display = 'none';
        document.getElementById('group_severe_5g').style.display = 'none';
        document.getElementById('group_non_severe_5g').style.display = 'none';

        // 결과 상세 항목 초기화
        document.getElementById('itemGeneralNC').style.display = 'none';
        document.getElementById('itemMajor3').style.display = 'none';
        document.getElementById('itemSevere').style.display = 'none';
        document.getElementById('itemNonSevere').style.display = 'none';

        // 병원 규모 선택창 노출 로직 (통원이거나 5세대면 필수)
        const tierGroup = document.getElementById('group_hospital_tier');
        if (careType === 'outpatient' || gen === '5') {
            tierGroup.style.display = 'block';
            if (careType === 'outpatient') {
                document.getElementById('tier_label').innerText = "병원 규모 (통원 공제 및 5세대 비급여 산출용)";
            } else {
                document.getElementById('tier_label').innerText = "병원 규모 (5세대 비중증 비급여 공제용)";
            }
        } else {
            tierGroup.style.display = 'none';
        }

        // 세대별 입력 필드 노출 로직
        if (gen !== '5') {
            document.getElementById('group_general_non_covered').style.display = 'block';
            document.getElementById('itemGeneralNC').style.display = 'flex';
        }

        if (gen === '3' || gen === '4' || gen === '5') {
            document.getElementById('group_3_major').style.display = 'block';
            document.getElementById('itemMajor3').style.display = 'flex';
        }

        if (gen === '5') {
            document.getElementById('group_severe_5g').style.display = 'block';
            document.getElementById('group_non_severe_5g').style.display = 'block';
            document.getElementById('itemSevere').style.display = 'flex';
            document.getElementById('itemNonSevere').style.display = 'flex';
        }
    }

    function openModal(type) {
        const gen = document.getElementById('generation').value;
        let data = type === 'coverage' ? coverageInfo[gen] : exclusionInfo[gen];
        
        document.getElementById('modalTitle').innerText = data.title;
        document.getElementById('modalBody').innerHTML = data.content;
        
        const modal = document.getElementById('modalOverlay');
        modal.style.display = 'flex';
        setTimeout(() => { modal.classList.add('show'); }, 10);
    }

    function closeModal(event) {
        const modal = document.getElementById('modalOverlay');
        modal.classList.remove('show');
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    function calculateInsurance() {
        const gen = document.getElementById('generation').value;
        const careType = document.querySelector('input[name="care_type"]:checked').value;
        const tier = document.getElementById('hospital_tier').value;
        
        const covered = Number(document.getElementById('covered').value) || 0;
        const general_nc = Number(document.getElementById('general_non_covered').value) || 0;
        const major3_nc = Number(document.getElementById('major_3_non_covered').value) || 0;
        const severe_nc = Number(document.getElementById('severe_5g').value) || 0;
        const non_severe_nc = Number(document.getElementById('non_severe_5g').value) || 0;

        let payoutCovered = 0, payoutGeneralNC = 0, payoutMajor3 = 0, payoutSevere = 0, payoutNonSevere = 0;

        // 병원 규모별 통원 정액공제액 산출
        let deductBasic = 10000;
        if (tier === 'hospital') deductBasic = 15000;
        else if (tier === 'general' || tier === 'tertiary') deductBasic = 20000;
        
        let deduct45Cov = (tier === 'general' || tier === 'tertiary') ? 20000 : 10000;

        // 5세대 비중증 공제율 (입/통원 공통 적용)
        let tierRate5g = 0.3; // 의원 30%
        if (tier === 'hospital') tierRate5g = 0.4;
        else if (tier === 'general') tierRate5g = 0.5;
        else if (tier === 'tertiary') tierRate5g = 0.6;

        if (careType === 'inpatient') {
            /* 입원 로직 */
            if (gen === '1') {
                payoutCovered = covered; payoutGeneralNC = general_nc;
            } else if (gen === '2-1' || gen === '2-2') {
                payoutCovered = covered * 0.9; payoutGeneralNC = general_nc * 0.9;
            } else if (gen === '2-3') {
                payoutCovered = covered * 0.9; payoutGeneralNC = general_nc * 0.8;
            } else if (gen === '3') {
                payoutCovered = covered * 0.9; payoutGeneralNC = general_nc * 0.8; payoutMajor3 = major3_nc * 0.7;
            } else if (gen === '4') {
                payoutCovered = covered * 0.8; payoutGeneralNC = general_nc * 0.7; payoutMajor3 = major3_nc * 0.7;
            } else if (gen === '5') {
                payoutCovered = covered * 0.8; 
                payoutSevere = severe_nc * 0.5; 
                payoutNonSevere = non_severe_nc * (1 - tierRate5g);
                payoutMajor3 = major3_nc * 0.7;
            }
        } else {
            /* 통원(외래) 로직 */
            let totalBasic = covered + general_nc;
            
            if (gen === '1') {
                // 1세대 통원: 통상 5천원 공제
                let deduct = Math.max(0, 5000);
                let propCov = totalBasic > 0 ? (covered / totalBasic) * deduct : 0;
                let propGen = totalBasic > 0 ? (general_nc / totalBasic) * deduct : 0;
                payoutCovered = Math.max(0, covered - propCov);
                payoutGeneralNC = Math.max(0, general_nc - propGen);
            } 
            else if (gen === '2-1' || gen === '2-2') {
                // 2세대 1차, 2차(선택형): 병원급별 1만/1.5만/2만 정액공제
                let propCov = totalBasic > 0 ? (covered / totalBasic) * deductBasic : 0;
                let propGen = totalBasic > 0 ? (general_nc / totalBasic) * deductBasic : 0;
                payoutCovered = Math.max(0, covered - propCov);
                payoutGeneralNC = Math.max(0, general_nc - propGen);
            } 
            else if (gen === '2-3') {
                // 2세대 3차(선택형): Max(정액공제, 급여10%+비급여20%)
                let ruleDeduct = (covered * 0.1) + (general_nc * 0.2);
                let finalDeduct = Math.max(deductBasic, ruleDeduct);
                let propCov = totalBasic > 0 ? (covered / totalBasic) * finalDeduct : 0;
                let propGen = totalBasic > 0 ? (general_nc / totalBasic) * finalDeduct : 0;
                payoutCovered = Math.max(0, covered - propCov);
                payoutGeneralNC = Math.max(0, general_nc - propGen);
            } 
            else if (gen === '3') {
                // 3세대(선택형): Max(정액공제, 급여10%+비급여20%) / 3대: Max(2만원, 30%)
                let ruleDeduct = (covered * 0.1) + (general_nc * 0.2);
                let finalDeduct = Math.max(deductBasic, ruleDeduct);
                let propCov = totalBasic > 0 ? (covered / totalBasic) * finalDeduct : 0;
                let propGen = totalBasic > 0 ? (general_nc / totalBasic) * finalDeduct : 0;
                payoutCovered = Math.max(0, covered - propCov);
                payoutGeneralNC = Math.max(0, general_nc - propGen);
                
                payoutMajor3 = Math.max(0, major3_nc - Math.max(20000, major3_nc * 0.3));
            } 
            else if (gen === '4') {
                // 4세대: 급여 Max(정액, 20%) / 비급여 Max(3만, 30%) / 3대 Max(3만, 30%)
                payoutCovered = Math.max(0, covered - Math.max(deduct45Cov, covered * 0.2));
                payoutGeneralNC = Math.max(0, general_nc - Math.max(30000, general_nc * 0.3));
                payoutMajor3 = Math.max(0, major3_nc - Math.max(30000, major3_nc * 0.3));
            } 
            else if (gen === '5') {
                // 5세대: 급여 Max(정액, 20%) / 중증 Max(3만, 50%) / 비중증 Max(3만, 종별비율) / 3대 Max(3만, 30%)
                payoutCovered = Math.max(0, covered - Math.max(deduct45Cov, covered * 0.2));
                payoutSevere = Math.max(0, severe_nc - Math.max(30000, severe_nc * 0.5));
                payoutNonSevere = Math.max(0, non_severe_nc - Math.max(30000, non_severe_nc * tierRate5g));
                payoutMajor3 = Math.max(0, major3_nc - Math.max(30000, major3_nc * 0.3));
            }
        }

        const totalPayout = payoutCovered + payoutGeneralNC + payoutMajor3 + payoutSevere + payoutNonSevere;

        // UI 텍스트 업데이트
        document.getElementById('valCovered').innerText = Math.floor(payoutCovered).toLocaleString('ko-KR') + " 원";
        document.getElementById('valGeneralNC').innerText = Math.floor(payoutGeneralNC).toLocaleString('ko-KR') + " 원";
        document.getElementById('valMajor3').innerText = Math.floor(payoutMajor3).toLocaleString('ko-KR') + " 원";
        document.getElementById('valSevere').innerText = Math.floor(payoutSevere).toLocaleString('ko-KR') + " 원";
        document.getElementById('valNonSevere').innerText = Math.floor(payoutNonSevere).toLocaleString('ko-KR') + " 원";
        
        document.getElementById('resultAmount').innerText = Math.floor(totalPayout).toLocaleString('ko-KR') + " 원";

        // 경고 메시지 동적 업데이트
        let disclaimerHtml = "* 2세대 및 3세대는 가입 비율이 압도적으로 높은 <b>'선택형'</b>을 기준으로 산출됩니다.<br>";
        if (careType === 'outpatient') {
            disclaimerHtml += "<b>* 주의: 본 산출은 순수 공제율을 반영한 금액이며, 통원 1회당 적용되는 최대 한도(예: 20~30만원)를 초과하여 지급될 수 없습니다.</b>";
        } else {
            disclaimerHtml += "* 입원 기준 공제율(약관 기준)이 반영된 산출금액입니다.";
        }
        document.getElementById('disclaimerText').innerHTML = disclaimerHtml;
        
        document.getElementById('resultBox').style.display = 'block';
    }

    // 초기화면 렌더링 시 필드 세팅
    window.onload = updateFields;
</script>
