<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세대별 실손의료보험 계산기</title>
    <style>
        /* 폰트 및 기본 모바일 최적화 설정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
            background-color: #f2f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .calculator-container {
            background-color: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #191f28;
            font-size: 22px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
            color: #4e5968;
        }
        select, input {
            width: 100%;
            padding: 16px;
            border: 1px solid #d1d6db;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px; /* iOS 자동 확대 방지 */
            color: #333d4b;
            background-color: #fafafa;
            -webkit-appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b95a1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px top 50%;
            background-size: 12px auto;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3182f6;
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.1);
            background-color: #ffffff;
        }
        input::placeholder {
            color: #b0b8c1;
        }
        button {
            width: 100%;
            padding: 18px;
            background-color: #3182f6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:active {
            background-color: #1b64da;
        }
        .result-box {
            margin-top: 30px;
            padding: 30px 20px;
            background-color: #f2f8ff;
            border-radius: 16px;
            text-align: center;
        }
        .result-box span {
            display: block;
            font-size: 15px;
            color: #4e5968;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .result-amount {
            font-size: 32px;
            font-weight: 800;
            color: #3182f6;
            letter-spacing: -0.5px;
        }
        .disclaimer {
            font-size: 13px;
            color: #8b95a1;
            margin-top: 15px;
            line-height: 1.5;
            word-break: keep-all;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>실손보험 예상 수령액 계산기</h2>
    
    <div class="form-group">
        <label for="generation">실손보험 세대 선택</label>
        <select id="generation">
            <option value="1">1세대 (2009년 9월 이전)</option>
            <option value="2">2세대 (2009년 10월 ~ 2017년 3월)</option>
            <option value="3">3세대 (2017년 4월 ~ 2021년 6월)</option>
            <option value="4">4세대 (2021년 7월 이후)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="covered">급여 의료비 (원)</label>
        <input type="number" id="covered" placeholder="예: 1000000" min="0" inputmode="numeric">
    </div>

    <div class="form-group">
        <label for="nonCovered">비급여 의료비 (원)</label>
        <input type="number" id="nonCovered" placeholder="예: 500000" min="0" inputmode="numeric">
    </div>

    <button onclick="calculateInsurance()">계산하기</button>

    <div class="result-box" id="resultBox" style="display: none;">
        <span>예상 보험금 수령액</span>
        <div class="result-amount" id="resultAmount">0 원</div>
        <div class="disclaimer">*입원비 기준 단순화된 산출금액으로 실제 지급액과 다를 수 있습니다.</div>
    </div>
</div>

<script>
    function calculateInsurance() {
        const generation = document.getElementById('generation').value;
        const coveredInput = document.getElementById('covered').value;
        const nonCoveredInput = document.getElementById('nonCovered').value;

        // 입력값이 없을 경우 0으로 처리
        const covered = coveredInput ? parseInt(coveredInput) : 0;
        const nonCovered = nonCoveredInput ? parseInt(nonCoveredInput) : 0;
        
        let payout = 0;

        switch(generation) {
            case "1":
                payout = covered + nonCovered;
                break;
            case "2":
                payout = (covered + nonCovered) * 0.9;
                break;
            case "3":
                payout = (covered * 0.9) + (nonCovered * 0.8);
                break;
            case "4":
                payout = (covered * 0.8) + (nonCovered * 0.7);
                break;
            default:
                payout = 0;
        }

        const resultBox = document.getElementById('resultBox');
        const resultAmount = document.getElementById('resultAmount');
        
        resultBox.style.display = 'block';
        resultAmount.innerText = Math.floor(payout).toLocaleString('ko-KR') + " 원";
    }
</script>

</body>
</html>
