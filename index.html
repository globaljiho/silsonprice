<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세대별 정밀 실손의료보험 계산기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
            background-color: #f2f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .calculator-container {
            background-color: #ffffff;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            position: relative;
        }
        h2 {
            text-align: center;
            color: #191f28;
            font-size: 22px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #4e5968;
        }
        select, input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d6db;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            color: #333d4b;
            background-color: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        select {
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b95a1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 14px top 50%;
            background-size: 12px auto;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3182f6;
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.1);
            background-color: #ffffff;
        }
        .info-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            color: #3182f6;
            background-color: rgba(49, 130, 246, 0.1);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #3182f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:active {
            background-color: #1b64da;
        }
        .result-box {
            margin-top: 25px;
            padding: 25px 20px;
            background-color: #f2f8ff;
            border-radius: 12px;
            text-align: center;
        }
        .result-box span {
            display: block;
            font-size: 14px;
            color: #4e5968;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .result-amount {
            font-size: 28px;
            font-weight: 800;
            color: #3182f6;
        }
        .disclaimer {
            font-size: 12px;
            color: #8b95a1;
            margin-top: 12px;
            line-height: 1.5;
            word-break: keep-all;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: #191f28;
            margin-bottom: 12px;
        }
        .modal-body {
            font-size: 13px;
            color: #4e5968;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .modal-body ul {
            padding-left: 18px;
            margin: 0;
        }
        .modal-body li {
            margin-bottom: 6px;
        }
        .modal-close-btn {
            width: 100%;
            padding: 12px;
            background-color: #f2f4f6;
            color: #4e5968;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>실손보험 예상 수령액 계산기</h2>
    
    <div class="form-group">
        <label for="generation">실손보험 세대 선택</label>
        <select id="generation" onchange="updateFields()">
            <option value="1">1세대 (2009년 7월 이전)</option>
            <option value="2-1">2세대 1차 (2009년 8월 ~ 2013년 3월)</option>
            <option value="2-2">2세대 2차 (2013년 4월 ~ 2015년 8월) (선택형 기준)</option>
            <option value="2-3">2세대 3차 (2015년 9월 ~ 2017년 3월) (선택형 기준)</option>
            <option value="3">3세대 (2017년 4월 ~ 2021년 6월) (선택형 기준)</option>
            <option value="4">4세대 (2021년 7월 ~ 2026년 5월 5일)</option>
            <option value="5">5세대 (2026년 5월 6일 이후)</option>
        </select>
        <button type="button" class="info-btn" onclick="openModal()">💡 세대별 핵심 보장내용 보기</button>
    </div>

    <div class="form-group">
        <label for="covered">급여 의료비 (원)</label>
        <input type="number" id="covered" placeholder="예: 1000000" min="0" inputmode="numeric">
    </div>

    <!-- 1~4세대를 위한 일반 비급여 -->
    <div class="form-group" id="group_general_non_covered">
        <label for="general_non_covered">일반 비급여 의료비 (원)</label>
        <input type="number" id="general_non_covered" placeholder="예: 500000" min="0" inputmode="numeric">
    </div>

    <!-- 3~5세대를 위한 3대 비급여 -->
    <div class="form-group" id="group_3_major" style="display: none;">
        <label for="major_3_non_covered">3대 비급여 (도수/체외충격파/주사/MRI) (원)</label>
        <input type="number" id="major_3_non_covered" placeholder="예: 300000" min="0" inputmode="numeric">
    </div>

    <!-- 5세대를 위한 중증 비급여 -->
    <div class="form-group" id="group_severe_5g" style="display: none;">
        <label for="severe_5g">중증 비급여 (특약1) (원)</label>
        <input type="number" id="severe_5g" placeholder="예: 1000000" min="0" inputmode="numeric">
    </div>

    <!-- 5세대를 위한 비중증 비급여 및 병원 종별 -->
    <div class="form-group" id="group_non_severe_5g" style="display: none;">
        <label for="non_severe_5g">비중증 비급여 (특약2) (원)</label>
        <input type="number" id="non_severe_5g" placeholder="예: 500000" min="0" inputmode="numeric">
        
        <label for="hospital_tier" style="margin-top: 10px;">병원 종별 (비중증 비급여 공제용)</label>
        <select id="hospital_tier">
            <option value="clinic">의원 (자기부담 30%)</option>
            <option value="hospital">병원 (자기부담 40%)</option>
            <option value="general">종합병원 (자기부담 50%)</option>
            <option value="tertiary">상급종합병원 (자기부담 60%)</option>
        </select>
    </div>

    <button type="button" class="submit-btn" onclick="calculateInsurance()">보험금 산출하기</button>

    <div class="result-box" id="resultBox" style="display: none;">
        <span>예상 보험금 수령액</span>
        <div class="result-amount" id="resultAmount">0 원</div>
        <div class="disclaimer">* 본 계산기는 입원 기준 공제율(약관 기준)을 적용한 단순화된 로직이며, 통원 공제금액 및 연간 한도 적용에 따라 실제 지급액과 다를 수 있습니다.</div>
    </div>
</div>

<!-- 세대별 주의사항 모달창 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="modal-close-btn" onclick="closeModal()">닫기</button>
    </div>
</div>

<script>
    const precautions = {
        "1": {
            title: "💡 1세대 실손 (~2009.7)",
            content: `<ul>
                <li><b>자기부담금 없음:</b> 상해/질병 입원의료비 100% 보상 (3천만/5천만/1억 한도)</li>
                <li><b>갱신주기:</b> 3년 또는 5년으로 갱신 시 보험료 인상폭이 클 수 있음</li>
                <li><b>면책사항:</b> 치매, 디스크, 직장/항문질환 등은 기본적으로 보상하지 않음 (단, 치매는 가입시기 및 보험사별 상이)</li>
            </ul>`
        },
        "2-1": {
            title: "💡 2세대 1차 (2009.8~2013.3)",
            content: `<ul>
                <li><b>표준화 도입:</b> 전 보험사 보장내용 통일, 입원 5천만원 한도</li>
                <li><b>자기부담금:</b> 10% 본인부담금 신설 (90% 보상)</li>
                <li><b>갱신주기:</b> 3년 자동갱신</li>
            </ul>`
        },
        "2-2": {
            title: "💡 2세대 2차 (2013.4~2015.8)",
            content: `<ul>
                <li><b>재가입 주기 신설:</b> 1년 갱신 / 15년 만기(재가입) 도입</li>
                <li><b>자기부담금:</b> 대부분 가입한 <b>'선택형'</b> 기준 10% 공제</li>
            </ul>`
        },
        "2-3": {
            title: "💡 2세대 3차 (2015.9~2017.3)",
            content: `<ul>
                <li><b>자기부담금 인상:</b> 대부분 가입한 <b>'선택형'</b> 기준, 비급여 항목의 자기부담금이 20%로 인상됨 (급여 10% / 비급여 20%)</li>
            </ul>`
        },
        "3": {
            title: "💡 3세대 실손 (2017.4~2021.6)",
            content: `<ul>
                <li><b>3대 비급여 분리:</b> 도수치료, 비급여 주사, MRI가 특약으로 분리되며 자기부담금 30% 적용</li>
                <li><b>자기부담금:</b> 기본 급여 10%, 기본 비급여 20% (선택형 기준)</li>
                <li><b>할인제도:</b> 직전 2년간 비급여 청구 이력이 없으면 차기 1년간 보험료 10% 할인</li>
            </ul>`
        },
        "4": {
            title: "💡 4세대 실손 (2021.7~2026.5)",
            content: `<ul>
                <li><b>재가입 주기 단축:</b> 1년 갱신 / 5년 만기(재가입)</li>
                <li><b>보험료 차등제:</b> 비급여 청구량에 따라 1~5등급으로 나뉘어 보험료 할증(최대 300%) 또는 할인</li>
                <li><b>자기부담금 상향:</b> 급여 20%, 비급여 30% 기본 공제</li>
            </ul>`
        },
        "5": {
            title: "💡 5세대 실손 (2026.5.6~)",
            content: `<ul>
                <li><b>비급여의 세분화:</b> 비급여를 '중증(특약1)'과 '비중증(특약2)'로 완전히 분리</li>
                <li><b>자기부담금 차등:</b> 중증 비급여는 50% 공제, 비중증 비급여는 병원 규모에 따라 30%~60% 차등 공제</li>
                <li>3대 비급여(도수,주사,MRI)는 30% 공제 적용</li>
                <li><b>보장 확대:</b> 출생 전 가입 시 선천성 뇌질환, 습관성 유산 및 불임 관련 급여 보장 등 주계약 보장 확대</li>
            </ul>`
        }
    };

    function updateFields() {
        const gen = document.getElementById('generation').value;
        
        // 필드 초기화
        document.getElementById('group_general_non_covered').style.display = 'none';
        document.getElementById('group_3_major').style.display = 'none';
        document.getElementById('group_severe_5g').style.display = 'none';
        document.getElementById('group_non_severe_5g').style.display = 'none';

        // 세대별 표시 로직
        if (gen !== '5') {
            document.getElementById('group_general_non_covered').style.display = 'block';
        }

        if (gen === '3' || gen === '4' || gen === '5') {
            document.getElementById('group_3_major').style.display = 'block';
        }

        if (gen === '5') {
            document.getElementById('group_severe_5g').style.display = 'block';
            document.getElementById('group_non_severe_5g').style.display = 'block';
        }
    }

    function openModal() {
        const gen = document.getElementById('generation').value;
        document.getElementById('modalTitle').innerText = precautions[gen].title;
        document.getElementById('modalBody').innerHTML = precautions[gen].content;
        
        const modal = document.getElementById('modalOverlay');
        modal.style.display = 'flex';
        setTimeout(() => { modal.classList.add('show'); }, 10);
    }

    function closeModal(event) {
        const modal = document.getElementById('modalOverlay');
        modal.classList.remove('show');
        setTimeout(() => { modal.style.display = 'none'; }, 300);
    }

    function calculateInsurance() {
        const gen = document.getElementById('generation').value;
        const tier = document.getElementById('hospital_tier').value;
        
        const covered = Number(document.getElementById('covered').value) || 0;
        const general_nc = Number(document.getElementById('general_non_covered').value) || 0;
        const major3_nc = Number(document.getElementById('major_3_non_covered').value) || 0;
        const severe_nc = Number(document.getElementById('severe_5g').value) || 0;
        const non_severe_nc = Number(document.getElementById('non_severe_5g').value) || 0;

        let payout = 0;

        if (gen === '1') {
            payout = covered + general_nc;
        } 
        else if (gen === '2-1' || gen === '2-2') {
            // 2세대 1차, 2차 (선택형 기준 10% 공제)
            payout = (covered + general_nc) * 0.9;
        }
        else if (gen === '2-3') {
            // 2세대 3차 (선택형 기준 급여 10%, 비급여 20% 공제)
            payout = (covered * 0.9) + (general_nc * 0.8);
        }
        else if (gen === '3') {
            // 3세대 (선택형 기준 급여 10%, 비급여 20%, 3대 비급여 30% 공제)
            payout = (covered * 0.9) + (general_nc * 0.8) + (major3_nc * 0.7);
        }
        else if (gen === '4') {
            payout = (covered * 0.8) + (general_nc * 0.7) + (major3_nc * 0.7);
        }
        else if (gen === '5') {
            let tierRate = 0.7; // 기본 의원(30% 공제 = 70% 보상)
            if (tier === 'hospital') tierRate = 0.6;
            else if (tier === 'general') tierRate = 0.5;
            else if (tier === 'tertiary') tierRate = 0.4;

            payout = (covered * 0.8) + (severe_nc * 0.5) + (non_severe_nc * tierRate) + (major3_nc * 0.7);
        }

        const resultBox = document.getElementById('resultBox');
        const resultAmount = document.getElementById('resultAmount');
        
        resultBox.style.display = 'block';
        resultAmount.innerText = Math.floor(payout).toLocaleString('ko-KR') + " 원";
    }

    // 초기화면 렌더링 시 필드 세팅
    window.onload = updateFields;
</script>

</body>
</html>
